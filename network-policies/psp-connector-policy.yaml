# PSP Egress Only Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: psp-egress-only
  namespace: cde-production
spec:
  podSelector:
    matchLabels:
      app: psp-connector
  policyTypes:
    - Ingress
    - Egress

  ingress: []

  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP