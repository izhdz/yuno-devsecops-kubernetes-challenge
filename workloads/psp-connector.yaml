apiVersion: apps/v1
kind: Deployment
metadata:
  name: psp-connector
  namespace: cde-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: psp-connector
  template:
    metadata:
      labels:
        app: psp-connector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10003
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: psp-connector
          image: registry.yuno-internal.io/psp-connector:latest

          ports:
            - containerPort: 8080

          envFrom:
            - secretRef:
                name: psp-connector-secrets

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
