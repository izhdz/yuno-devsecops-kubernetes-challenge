apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-authorization-api
  namespace: cde-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-authorization-api
  template:
    metadata:
      labels:
        app: payment-authorization-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001

      containers:
        - name: payment-api
          image: registry.yuno-internal.io/payment-api:latest

          ports:
            - containerPort: 8080

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
