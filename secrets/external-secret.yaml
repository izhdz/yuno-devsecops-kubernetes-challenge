apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: psp-connector-secrets
  namespace: cde-production
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: psp-connector-secrets
    creationPolicy: Owner

  data:
    - secretKey: stripe-api-key
      remoteRef:
        key: secret/data/psp
        property: stripe

    - secretKey: adyen-api-key
      remoteRef:
        key: secret/data/psp
        property: adyen
