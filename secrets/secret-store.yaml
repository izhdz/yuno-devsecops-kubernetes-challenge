apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.yuno-internal.io"
      path: "secret"
      version: "v2"

    auth:
      kubernetes:
        mountPath: "kubernetes"
        role: "external-secrets-role"
